<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0d1425"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5c8" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#00e5c8"/>
      <stop offset="70%" stop-color="#00e5c8"/>
      <stop offset="100%" stop-color="#6b5ce7" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="anomalyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4d6a"/>
      <stop offset="100%" stop-color="#ff4d6a" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5c8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00e5c8" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="anomalyGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="400" fill="url(#bg)"/>
  
  <!-- Subtle grid dots -->
  <g opacity="0.08">
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#00e5c8"/>
    </pattern>
    <rect width="1200" height="400" fill="url(#dots)"/>
  </g>
  
  <!-- Normal baseline area fill -->
  <path d="M0,280 Q50,275 100,270 T200,265 T300,260 T400,255 T500,250 T600,255 T650,258 T700,240 T750,200 T780,140 T800,130 T820,145 T850,200 T900,250 T950,260 T1000,255 T1050,260 T1100,258 T1200,255 L1200,400 L0,400 Z" fill="url(#glowGrad)" opacity="0.5"/>
  
  <!-- Secondary signal line (dedupe ratio) -->
  <path d="M0,300 Q50,298 100,295 T200,290 T300,292 T400,288 T500,285 T600,290 T650,292 T700,288 T750,270 T780,230 T800,225 T820,235 T850,270 T900,285 T950,290 T1000,288 T1050,292 T1100,290 T1200,288" 
        fill="none" stroke="#6b5ce7" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,4"/>
  
  <!-- Main time series line - normal pattern -->
  <path d="M0,280 Q50,275 100,270 T200,265 T300,260 T400,255 T500,250 T600,255 T650,258" 
        fill="none" stroke="url(#lineGrad)" stroke-width="2.5" filter="url(#glow)"/>
  
  <!-- Anomaly spike -->
  <path d="M650,258 L700,240 L750,200 L780,140 L800,100 L820,145 L850,200 L900,250" 
        fill="none" stroke="#ff4d6a" stroke-width="3" filter="url(#anomalyGlow)"/>
  
  <!-- Resume normal -->
  <path d="M900,250 T950,260 T1000,255 T1050,260 T1100,258 T1200,255" 
        fill="none" stroke="url(#lineGrad)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Anomaly zone highlight -->
  <rect x="660" y="80" width="230" height="200" fill="#ff4d6a" opacity="0.04" rx="4"/>
  <line x1="660" y1="80" x2="660" y2="280" stroke="#ff4d6a" stroke-width="1" opacity="0.3" stroke-dasharray="6,4"/>
  <line x1="890" y1="80" x2="890" y2="280" stroke="#ff4d6a" stroke-width="1" opacity="0.3" stroke-dasharray="6,4"/>

  <!-- Threshold line -->
  <line x1="0" y1="220" x2="1200" y2="220" stroke="#00e5c8" stroke-width="1" opacity="0.2" stroke-dasharray="8,6"/>
  <text x="1140" y="215" fill="#00e5c8" font-family="monospace" font-size="9" opacity="0.4">threshold</text>
  
  <!-- Data points on the normal line -->
  <g fill="#00e5c8" opacity="0.6">
    <circle cx="100" cy="270" r="2.5"/>
    <circle cx="200" cy="265" r="2.5"/>
    <circle cx="300" cy="260" r="2.5"/>
    <circle cx="400" cy="255" r="2.5"/>
    <circle cx="500" cy="250" r="2.5"/>
    <circle cx="600" cy="255" r="2.5"/>
    <circle cx="950" cy="260" r="2.5"/>
    <circle cx="1050" cy="260" r="2.5"/>
  </g>
  
  <!-- Anomaly data points -->
  <g fill="#ff4d6a" filter="url(#anomalyGlow)">
    <circle cx="700" cy="240" r="3"/>
    <circle cx="750" cy="200" r="3.5"/>
    <circle cx="780" cy="140" r="4"/>
    <circle cx="800" cy="100" r="5"/>
    <circle cx="820" cy="145" r="3.5"/>
    <circle cx="850" cy="200" r="3"/>
  </g>
  
  <!-- Threat score badge -->
  <g transform="translate(800, 60)">
    <rect x="-30" y="-18" width="60" height="28" rx="4" fill="#ff4d6a" opacity="0.3" stroke="#ff4d6a" stroke-width="1"/>
    <text x="0" y="-1" text-anchor="middle" fill="#ff4d6a" font-family="monospace" font-size="11" font-weight="bold">THREAT 8</text>
  </g>

  <!-- Scattered particles -->
  <g opacity="0.15">
    <circle cx="50" cy="50" r="1.5" fill="#00e5c8"/>
    <circle cx="180" cy="80" r="1" fill="#6b5ce7"/>
    <circle cx="320" cy="40" r="1.5" fill="#00e5c8"/>
    <circle cx="450" cy="90" r="1" fill="#6b5ce7"/>
    <circle cx="570" cy="30" r="1.5" fill="#00e5c8"/>
    <circle cx="1000" cy="60" r="1" fill="#6b5ce7"/>
    <circle cx="1100" cy="45" r="1.5" fill="#00e5c8"/>
    <circle cx="1150" cy="100" r="1" fill="#6b5ce7"/>
    <circle cx="80" cy="350" r="1" fill="#6b5ce7"/>
    <circle cx="250" cy="370" r="1.5" fill="#00e5c8"/>
    <circle cx="1050" cy="350" r="1" fill="#00e5c8"/>
    <circle cx="1130" cy="370" r="1.5" fill="#6b5ce7"/>
  </g>
  
  <!-- Server icons as abstract dots on left -->
  <g transform="translate(30, 150)" opacity="0.25">
    <rect x="0" y="0" width="8" height="6" rx="1" fill="#00e5c8"/>
    <rect x="0" y="10" width="8" height="6" rx="1" fill="#00e5c8"/>
    <rect x="0" y="20" width="8" height="6" rx="1" fill="#00e5c8"/>
    <rect x="0" y="30" width="8" height="6" rx="1" fill="#6b5ce7"/>
    <rect x="0" y="40" width="8" height="6" rx="1" fill="#00e5c8"/>
  </g>
</svg>
